schema_version: 1

context:
  version: "0.1.5"

package:
  name: r-changepointga
  version: ${{ version }}

source:
  url:
    - https://cran.r-project.org/src/contrib/changepointGA_${{ version }}.tar.gz
    - https://cran.r-project.org/src/contrib/Archive/changepointGA/changepointGA_${{ version }}.tar.gz
  sha256: 755754fb6df3782681bf270d303f83d443fca4a796917bf5ef663d8b658aed18

build:
  number: 0
  script: R CMD INSTALL --no-multiarch --with-keep.source .
  dynamic_linking:
    rpaths:
      - lib/R/lib/
      - lib/
    missing_dso_allowlist:
      - if: win
        then:
          - "*/R.dll"
          - "*/Rblas.dll"
          - "*/Rlapack.dll"

requirements:
  build:
    - if: unix
      then:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
    - if: win
      then:
        - ${{ compiler('m2w64_c') }}
        - ${{ compiler('m2w64_cxx') }}
        - m2-filesystem
        - m2-sed
        - m2-coreutils
        - m2-zip
    - if: unix
      then: make
    - if: win
      then: m2-make
  host:
    - r-base >=4.3.0
    - r-rcpp
    - r-rcpparmadillo
    - r-foreach
    - r-doparallel
    - r-clue
  run:
    - r-base >=4.3.0
    - r-rcpp
    - r-foreach
    - r-doparallel
    - r-clue

tests:
  - script:
      - Rscript -e "library(changepointGA)"

about:
  homepage: https://github.com/mli171/changepointGA
  summary: Changepoint Detection via Modified Genetic Algorithms
  license: MIT
  license_file: LICENSE
  repository: https://CRAN.R-project.org/package=changepointGA

extra:
  recipe-maintainers:
    - roaldarbol
