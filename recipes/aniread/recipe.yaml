schema_version: 1

context:
  version: "0.4.1"

package:
  name: r-aniread
  version: ${{ version }}

source:
  url: https://animovement.r-universe.dev/src/contrib/aniread_${{ version }}.tar.gz
  sha256: be1ed3f9f128bcc9443d17c7f91f81e7667d0e6b2bed01b66a7b5a11e24dc8be

build:
  number: 0
  noarch: generic
  script: R CMD INSTALL --no-multiarch --with-keep.source .

requirements:
  host:
    - r-base >=4.1.0
    - r-aniframe
    - r-cli
    - r-dplyr
    - r-janitor
    - r-rlang
    - r-stringr
    - r-tidyr
    - r-tidyselect
    - r-vroom
  run:
    - r-base >=4.1.0
    - r-aniframe
    - r-cli
    - r-dplyr
    - r-janitor
    - r-rlang
    - r-stringr
    - r-tidyr
    - r-tidyselect
    - r-vroom

tests:
  - script:
      - Rscript -e "library(aniread)"

about:
  homepage: https://github.com/animovement/aniread
  summary: An R package for reading and writing movement data
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - roaldarbol
