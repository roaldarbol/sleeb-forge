schema_version: 1

context:
  version: "0.3.2"
  python_min: "3.12"

package:
  name: croppy
  version: ${{ version }}

source:
  url: https://github.com/roaldarbol/croppy/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 147cd8b1e6721ef85e2aa60cea64f8fc3d9d00509c6efe1dd63f36d6221aab12

build:
  number: 0
  noarch: python
  python:
    entry_points:
      - croppy = croppy.cli:app

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - pyside6 >=6.7
    - typer >=0.12
    - loguru >=0.7
    - ffmpeg
    - menuinst >=2

tests:
  - python:
      imports:
        - croppy
      python_version: ${{ python_min }}.*
  - script:
      - croppy --version

about:
  homepage: https://github.com/roaldarbol/croppy
  repository: https://github.com/roaldarbol/croppy
  summary: Visual GUI for cropping, combining, and compressing videos via ffmpeg.
  description: |
    croppy is a desktop app for cropping, combining, and compressing videos,
    built on ffmpeg and Qt (PySide6). It provides a Crop / Combine / Compress
    workflow with a queued job system.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - roaldarbol
